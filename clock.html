<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Clock Time</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d12;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
      overflow: hidden;
      touch-action: manipulation;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(1.5rem, 5vw, 2.5rem);
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 420px;
    }

    .clock-wrap {
      /* Responsive: nearly full width on small screens, capped on larger */
      width: min(90vw, 380px);
      height: min(90vw, 380px);
      position: relative;
      filter: drop-shadow(0 0 40px rgba(200, 160, 40, 0.18));
    }

    svg.clock-face {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* Hand transitions — rotate around SVG center (100 100) */
    #hand-hour {
      transform-origin: 100px 100px;
      transition: transform 0.55s cubic-bezier(0.34, 1.4, 0.64, 1);
    }
    #hand-minute {
      transform-origin: 100px 100px;
      transition: transform 0.55s cubic-bezier(0.34, 1.4, 0.64, 1);
    }

    /* Answer reveal */
    .answer {
      font-size: clamp(2.8rem, 14vw, 4rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      color: #ffd060;
      line-height: 1;
      min-height: 1.2em;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
    }
    .answer.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .hint {
      font-size: clamp(0.7rem, 3.5vw, 0.85rem);
      color: #444;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 500;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="clock-wrap">
    <svg class="clock-face" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

      <!-- Outer ring -->
      <circle cx="100" cy="100" r="97" fill="#16162a" stroke="#ffd060" stroke-width="2"/>

      <!-- Inner subtle track -->
      <circle cx="100" cy="100" r="85" fill="none" stroke="#1e1e38" stroke-width="1"/>

      <!-- Tick marks + hour numbers — generated by JS -->
      <g id="markers"></g>

      <!-- Minute hand — longer -->
      <line id="hand-minute"
            x1="100" y1="100" x2="100" y2="25"
            stroke="#f0f0ff" stroke-width="5" stroke-linecap="round"/>

      <!-- Hour hand — shorter, same style -->
      <line id="hand-hour"
            x1="100" y1="108" x2="100" y2="47"
            stroke="#f0f0ff" stroke-width="5" stroke-linecap="round"/>

      <!-- Center cap -->
      <circle cx="100" cy="100" r="6" fill="#ffd060"/>
      <circle cx="100" cy="100" r="3" fill="#0d0d12"/>

    </svg>
  </div>

  <div class="answer" id="answer">12:00</div>
  <div class="hint" id="hint">tap to see the time</div>

</div>

<script>
  const CX = 100, CY = 100;

  // ── Build tick marks and hour numbers ──────────────────────────────────────
  function buildMarkers() {
    const g = document.getElementById('markers');

    for (let h = 1; h <= 12; h++) {
      // Angle: 12 o'clock = -π/2, clockwise
      const angle = (h / 12) * 2 * Math.PI - Math.PI / 2;

      // Major tick
      const t1r = 93, t2r = 82;
      const tick = makeSVG('line', {
        x1: CX + t1r * Math.cos(angle), y1: CY + t1r * Math.sin(angle),
        x2: CX + t2r * Math.cos(angle), y2: CY + t2r * Math.sin(angle),
        stroke: '#ffd060',
        'stroke-width': (h % 3 === 0) ? '3' : '1.8',
        'stroke-linecap': 'round'
      });
      g.appendChild(tick);

      // Hour number
      const nr = 68;
      const txt = makeSVG('text', {
        x: CX + nr * Math.cos(angle),
        y: CY + nr * Math.sin(angle),
        'text-anchor': 'middle',
        'dominant-baseline': 'central',
        fill: 'white',
        'font-size': '13',
        'font-weight': '700',
        'font-family': '-apple-system, BlinkMacSystemFont, Helvetica, sans-serif'
      });
      txt.textContent = h;
      g.appendChild(txt);
    }

    // Minor ticks (every 5 min except on hour positions)
    for (let m = 0; m < 60; m++) {
      if (m % 5 === 0) continue;
      const angle = (m / 60) * 2 * Math.PI - Math.PI / 2;
      const tick = makeSVG('line', {
        x1: CX + 93 * Math.cos(angle), y1: CY + 93 * Math.sin(angle),
        x2: CX + 88 * Math.cos(angle), y2: CY + 88 * Math.sin(angle),
        stroke: '#3a3a5a',
        'stroke-width': '1',
        'stroke-linecap': 'round'
      });
      g.appendChild(tick);
    }
  }

  function makeSVG(tag, attrs) {
    const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
    return el;
  }

  // ── Clock logic ─────────────────────────────────────────────────────────────
  const handHour   = document.getElementById('hand-hour');
  const handMinute = document.getElementById('hand-minute');
  const answerEl   = document.getElementById('answer');
  const hintEl     = document.getElementById('hint');

  let current = { hour: 0, minute: 0 }; // minute: 0 or 30
  let state = 'question'; // 'question' | 'answer'

  function pickTime() {
    // Avoid repeating exact same time
    let h, m;
    do {
      h = Math.floor(Math.random() * 12) + 1;
      m = Math.random() < 0.5 ? 0 : 30;
    } while (h === current.hour && m === current.minute);
    return { hour: h, minute: m };
  }

  function showQuestion() {
    current = pickTime();

    // Hour hand: 30° per hour + 15° extra for :30
    const hourDeg = (current.hour % 12) * 30 + (current.minute === 30 ? 15 : 0);
    handHour.style.transform = `rotate(${hourDeg}deg)`;

    // Minute hand: 0° for :00, 180° for :30
    const minDeg = current.minute === 30 ? 180 : 0;
    handMinute.style.transform = `rotate(${minDeg}deg)`;

    answerEl.classList.remove('visible');
    hintEl.textContent = 'tap to see the time';
    state = 'question';
  }

  function showAnswer() {
    const m = current.minute === 0 ? '00' : '30';
    answerEl.textContent = `${current.hour}:${m}`;
    answerEl.classList.add('visible');
    hintEl.textContent = 'tap for next';
    state = 'answer';
  }

  document.body.addEventListener('click', () => {
    if (state === 'question') showAnswer();
    else showQuestion();
  });

  // ── Init ────────────────────────────────────────────────────────────────────
  buildMarkers();
  showQuestion();
</script>

</body>
</html>
